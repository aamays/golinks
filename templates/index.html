<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>go/links</title>
    <link rel="stylesheet" href="/_/static/index.css">
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light');
    </script>
    <div class="container">
        <div class="header">
            <h1><span>go/links</span></h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme"></button>
        </div>

        <div class="glass-card">
            <form class="add-form" onsubmit="return addLink(event)">
                <input type="text" name="phrase" placeholder="phrase" required>
                <input type="url" name="url" placeholder="https://example.com" required>
                <button type="submit" class="btn-add">Add</button>
            </form>
        </div>

        <div class="glass-card">
            <table>
                <thead>
                    <tr><th>Link</th><th>Destination</th><th></th></tr>
                </thead>
                <tbody id="links">
                    {{range .}}
                    <tr data-phrase="{{.Phrase}}">
                        <td><a class="phrase-link" href="/{{.Phrase}}">go/{{.Phrase}}</a></td>
                        <td class="url-cell"><span class="url-text">{{.URL}}</span></td>
                        <td class="actions">
                            <button class="btn-edit" onclick="editLink(this)">Edit</button>
                            <button class="btn-delete" onclick="deleteLink('{{.Phrase}}')">Delete</button>
                        </td>
                    </tr>
                    {{else}}
                    <tr class="empty-row"><td colspan="3" class="empty">No links yet. Add one above.</td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <span>golinks — local link shortener built with Go</span>
        <div class="footer-links">
            <a href="https://github.com/aamays/golinks" target="_blank" rel="noopener">
                <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </a>
        </div>
    </footer>

    <script src="/_/static/index.js"></script>
</body>
</html>
